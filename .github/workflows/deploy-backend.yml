name: Deploy backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      ARTIFACT_REPOSITORY: ${{ secrets.ARTIFACT_REPOSITORY }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate backend deployment secrets
        run: |
          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GCP_SERVICE_ACCOUNT_JSON
            ARTIFACT_REPOSITORY
            CLOUD_RUN_SERVICE
            DATABASE_URL
            DATABASE_USER
            DATABASE_PASSWORD
            S3_BUCKET
            S3_REGION
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            OPENAI_API_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              exit 1
            fi
          done
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_JSON }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet
      - run: |
          IMAGE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REPOSITORY/thought-box:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --port 8080 \
            --set-env-vars "^|^APP_ENV=prod|DATABASE_URL=$DATABASE_URL|DATABASE_USER=$DATABASE_USER|DATABASE_PASSWORD=$DATABASE_PASSWORD|CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS|S3_BUCKET=$S3_BUCKET|S3_REGION=$S3_REGION|AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY|OPENAI_API_KEY=$OPENAI_API_KEY|SENTRY_DSN=$SENTRY_DSN" \
            --allow-unauthenticated
